<!DOCTYPE html>
<html>
<head>
<title>Guess The Number - Ultimate</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

/* ===== Animated Stars Background ===== */

/* =========================
   PREMIUM FOOTER
   ========================= */

.footer{
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:12px;
font-size:14px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
color:#00f5ff;
letter-spacing:1px;
box-shadow:0 0 20px #00f5ff;
animation:footerGlow 3s infinite alternate;
z-index:10;
}

.footer span{
color:#15b9d6;
font-weight:bold;
text-shadow:0 0 10px #2e92b6;
}

/* glowing animation */

@keyframes footerGlow{

from{
box-shadow:0 0 10px #00f5ff;
}

to{
box-shadow:0 0 30px #00f5ff;
}

}


/* =========================
   FLOATING PARTICLES
   ========================= */

.particle{
position:fixed;
width:6px;
height:6px;
background:#00f5ff;
border-radius:50%;
pointer-events:none;
animation:floatParticle linear infinite;
opacity:.7;
z-index:-1;
}

@keyframes floatParticle{

from{
transform:translateY(100vh);
}

to{
transform:translateY(-10vh);
}

}


/* =========================
   MOUSE GLOW EFFECT
   ========================= */

.cursor-glow{

position:fixed;
width:300px;
height:300px;
background:radial-gradient(circle,#00f5ff55,transparent);
pointer-events:none;
border-radius:50%;
z-index:-1;
transform:translate(-50%,-50%);
}


.stars{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-3;
overflow:hidden;
}

.stars span{
position:absolute;
display:block;
width:2px;
height:2px;
background:white;
animation:starMove linear infinite;
opacity:0.8;
}

@keyframes starMove{
from{
transform:translateY(0px);
}
to{
transform:translateY(100vh);
}
}


/* ===== Floating Glow Orbs ===== */

.orb{
position:fixed;
border-radius:50%;
filter:blur(80px);
opacity:0.6;
z-index:-2;
animation:floatOrb infinite alternate ease-in-out;
}

.orb1{
width:300px;
height:300px;
background:#00f5ff;
top:10%;
left:10%;
animation-duration:8s;
}

.orb2{
width:250px;
height:250px;
background:#ff0055;
bottom:10%;
right:10%;
animation-duration:10s;
}

.orb3{
width:200px;
height:200px;
background:#00ff88;
top:50%;
left:50%;
animation-duration:12s;
}

@keyframes floatOrb{
from{
transform:translate(0,0);
}
to{
transform:translate(100px,-80px);
}
}
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at top,#141e30,#000);
overflow:hidden;
color:white;
}

.container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:40px;
border-radius:20px;
width:380px;
text-align:center;
box-shadow:0 0 40px #00f5ff;
transition:0.3s;
}

h1{
color:#00f5ff;
text-shadow:0 0 20px #00f5ff;
}

select,input{
width:85%;
padding:10px;
border-radius:10px;
border:none;
text-align:center;
margin:10px 0;
}

button{
padding:10px 20px;
border-radius:25px;
border:none;
margin:5px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.check-btn{
background:#00f5ff;
box-shadow:0 0 15px #00f5ff;
}

.restart-btn{
background:#ff0055;
box-shadow:0 0 15px #ff0055;
color:white;
}

button:hover{
transform:scale(1.1);
}

/* Progress Bar */
.progress-container{
width:100%;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:10px;
margin-top:10px;
}

.progress-bar{
height:100%;
width:100%;
background:#00f5ff;
border-radius:10px;
transition:width 1s linear;
}

/* Confetti */
.confetti{
position:fixed;
width:8px;
height:8px;
top:50%;
left:50%;
pointer-events:none;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y)) rotate(720deg);
opacity:0;
}
}

/* Shake */
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.shake{animation:shake 0.3s;}
.win-glow{box-shadow:0 0 50px #00ff88 !important;}

/* Popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 30px #ff0055;
}
</style>
</head>

<body>

    <div class="stars" id="stars"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="container">

<h1>🎯 Guess The Number</h1>

<select id="difficulty" onchange="setDifficulty()">
<option value="easy">Easy (1-10)</option>
<option value="medium" selected>Medium (1-20)</option>
<option value="hard">Hard (1-50)</option>
</select>

<p id="rangeText">Range: 1 - 20</p>
<p>⏳ Time: <span id="timer">40</span>s</p>

<div class="progress-container">
<div class="progress-bar" id="progressBar"></div>
</div>

<input id="guessInput" type="number">
<br>

<button class="check-btn" onclick="check()">Check</button>
<button onclick="showHint()">💡 Hint</button>
<button class="restart-btn" onclick="restart()">Restart</button>

<p id="result">Start guessing...</p>
<p id="score">Score: 20</p>
<p id="highscore">High Score: 0</p>

</div>

<div class="popup" id="gameOverPopup">
<div class="popup-content">
<h2 id="popupText"></h2>
<button onclick="closePopup()">Close</button>
</div>
</div>
<div class="footer">
Developed with ❤️ by <span>Joy Xavier</span> | Ultimate Game 🎮
</div>

<div class="cursor-glow" id="cursorGlow"></div>

<script>

let min=1,max=20;
let score=20;
let highScore=localStorage.getItem("highScore")||0;
let randomNumber;
let timeLeft=40;
let timerInterval;

document.getElementById("highscore").textContent="High Score: "+highScore;

function setDifficulty(){
let level=document.getElementById("difficulty").value;

if(level==="easy"){min=1;max=10;score=15;timeLeft=30;}
else if(level==="medium"){min=1;max=20;score=20;timeLeft=40;}
else{min=1;max=50;score=30;timeLeft=50;}

document.getElementById("rangeText").textContent="Range: "+min+" - "+max;
restart();
}

function startTimer(){
clearInterval(timerInterval);
document.getElementById("timer").textContent=timeLeft;
let totalTime=timeLeft;

timerInterval=setInterval(()=>{
timeLeft--;
document.getElementById("timer").textContent=timeLeft;

let percent=(timeLeft/totalTime)*100;
document.getElementById("progressBar").style.width=percent+"%";

if(timeLeft<=0){
clearInterval(timerInterval);
showGameOver("⏰ Time's Up! Number was "+randomNumber);
}
},1000);
}

function check(){
let guess=Number(document.getElementById("guessInput").value);

if(guess===randomNumber){
document.getElementById("result").textContent="🎉 Correct!";
launchConfetti();
clearInterval(timerInterval);

document.querySelector(".container").classList.add("win-glow");
setTimeout(()=>document.querySelector(".container").classList.remove("win-glow"),2000);

if(score>highScore){
highScore=score;
localStorage.setItem("highScore",highScore);
document.getElementById("highscore").textContent="High Score: "+highScore;
}
}else{
score--;
document.getElementById("score").textContent="Score: "+score;

document.querySelector(".container").classList.add("shake");
setTimeout(()=>document.querySelector(".container").classList.remove("shake"),300);

if(score<=0){
showGameOver("💀 Game Over! Number was "+randomNumber);
}
}
}

function restart(){

// generate NEW random number every time
randomNumber =
Math.floor(Math.random() * (max - min + 1)) + min;


// reset score based on difficulty
let level=document.getElementById("difficulty").value;

if(level==="easy") score=15;
else if(level==="medium") score=20;
else score=30;


// reset timer based on difficulty
if(level==="easy") timeLeft=30;
else if(level==="medium") timeLeft=40;
else timeLeft=50;


// update UI
document.getElementById("score").textContent="Score: "+score;

document.getElementById("result").textContent="Start guessing...";

document.getElementById("guessInput").value="";


// start new timer
startTimer();

}
function showHint(){
if(randomNumber%2===0)
document.getElementById("result").textContent="Hint: Even Number";
else
document.getElementById("result").textContent="Hint: Odd Number";
}

function launchConfetti(){
for(let i=0;i<100;i++){
let c=document.createElement("div");
c.classList.add("confetti");

let x=(Math.random()-0.5)*800+"px";
let y=(Math.random()-0.5)*800+"px";

c.style.setProperty("--x",x);
c.style.setProperty("--y",y);
c.style.background="hsl("+Math.random()*360+",100%,50%)";
c.style.animation="explode 1.5s ease-out forwards";

document.body.appendChild(c);
setTimeout(()=>c.remove(),1500);
}
}

function showGameOver(message){
document.getElementById("popupText").textContent=message;
document.getElementById("gameOverPopup").style.display="flex";
}

function closePopup(){
document.getElementById("gameOverPopup").style.display="none";
}

restart();

</script>
<script>

/* Generate stars */

const starsContainer=document.getElementById("stars");

for(let i=0;i<120;i++){

let star=document.createElement("span");

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

let size=Math.random()*3;

star.style.width=size+"px";
star.style.height=size+"px";

star.style.animationDuration=(Math.random()*10+5)+"s";

starsContainer.appendChild(star);

}

/* =========================
   FLOATING PARTICLES
   ========================= */

for(let i=0;i<30;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDuration=
(Math.random()*10+5)+"s";

p.style.opacity=Math.random();

document.body.appendChild(p);

}


/* =========================
   MOUSE GLOW
   ========================= */

const glow=
document.getElementById("cursorGlow");

document.addEventListener("mousemove",(e)=>{

glow.style.left=e.clientX+"px";

glow.style.top=e.clientY+"px";

});
</script>

</body>
</html>
